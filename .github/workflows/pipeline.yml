name: Snyk - Security Analysis

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Snyk - Análisis de dependencias (SCA)
  # Detecta vulnerabilidades en paquetes npm
  # ─────────────────────────────────────────────
  snyk-dependencies:
    name: Snyk - Dependency Scan (SCA)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk dependency scan
        id: snyk-deps
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk
          snyk test --severity-threshold=high --sarif-file-output=snyk-deps.sarif || true

      - name: Check if sarif file exists
        id: check-deps-sarif
        run: |
          if [ -f snyk-deps.sarif ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Snyk","rules":[]}},"results":[]}]}' > snyk-deps.sarif
          fi

      - name: Upload Snyk dependency results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-deps.sarif
        if: always()

  # ─────────────────────────────────────────────
  # JOB 2: Snyk Code - Análisis de código fuente (SAST)
  # Detecta vulnerabilidades en el código TypeScript/Angular
  # ─────────────────────────────────────────────
  snyk-code:
    name: Snyk Code - Static Analysis (SAST)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk Code static analysis
        id: snyk-code
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk
          snyk code test --sarif-file-output=snyk-code.sarif || true

      - name: Check if sarif file exists
        id: check-code-sarif
        run: |
          if [ -f snyk-code.sarif ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"SnykCode","rules":[]}},"results":[]}]}' > snyk-code.sarif
          fi

      - name: Upload Snyk Code results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-code.sarif
        if: always()
